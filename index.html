<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦  PromptR  ✦ | AI Prompt Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --secondary: #3b82f6;
            --secondary-glow: rgba(59, 130, 246, 0.4);
            --accent: #06b6d4;
            --bg-deep: #000000;
            --surface-1: #0a0a0a;
            --surface-2: #121212;
            --border: rgba(255, 255, 255, 0.08);
            --border-bright: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --aura-opacity: 0.4;
            --selection-bg: rgba(16, 185, 129, 0.3);
        }

        .light-mode {
            --bg-deep: #fdfdfd;
            --surface-1: #ffffff;
            --surface-2: #f8fafc;
            --border: rgba(0, 0, 0, 0.06);
            --border-bright: rgba(0, 0, 0, 0.12);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(0, 0, 0, 0.05);
            --aura-opacity: 0.2;
            --selection-bg: rgba(16, 185, 129, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
        }

        .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        ::selection {
            background-color: var(--selection-bg);
        }

        @keyframes logo-ignite {
            0% { opacity: 0; filter: blur(20px) brightness(0); transform: scale(0.85); }
            10% { opacity: 0.3; filter: blur(15px) brightness(0.5); }
            20% { opacity: 0.1; filter: blur(18px) brightness(0.2); }
            35% { opacity: 0.7; filter: blur(5px) brightness(2); transform: scale(1.05); }
            45% { opacity: 0.4; filter: blur(8px) brightness(0.8); }
            60% { opacity: 1; filter: blur(0px) brightness(2.5); transform: scale(1.1); }
            100% { opacity: 1; filter: blur(0px) brightness(1); transform: scale(1); }
        }

        @keyframes neon-breathing {
            0%, 100% { filter: drop-shadow(0 0 12px var(--primary-glow)) brightness(1); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--primary-glow)) brightness(1.1); transform: scale(1.01); }
        }

        .logo-floating {
            animation: ethereal-float 8s ease-in-out infinite;
        }

        @keyframes ethereal-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-8px) rotate(0.5deg); }
            66% { transform: translateY(-4px) rotate(-0.5deg); }
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body:not(.light-mode) .glass-panel {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-panel:hover {
            border-color: var(--border-bright);
            background: rgba(255, 255, 255, 0.03);
        }

        body.light-mode .glass-panel:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .cyber-button {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -150%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(30deg);
            transition: left 0.8s ease;
            pointer-events: none;
        }

        .cyber-button:hover::after {
            left: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(var(--text-muted), 0.2);
            border-radius: 10px;
        }
        
        @keyframes text-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .text-gradient-flow {
            background: linear-gradient(90deg, #10b981, #3b82f6, #06b6d4, #10b981);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-flow 4s linear infinite;
        }

        .animate-ignite {
            animation: logo-ignite 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .animate-pulse-neon {
            animation: neon-breathing 4s ease-in-out infinite;
        }

        /* Micro-interactions */
        .interactive-scale {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .interactive-scale:hover {
            transform: scale(1.02);
        }
        .interactive-scale:active {
            transform: scale(0.97);
        }

        .focus-ring {
            transition: all 0.3s ease;
        }
        .focus-ring:focus-within {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
        }

        input, textarea {
            background: transparent;
            color: var(--text-main);
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease !important;
        }

        /* Syntax Highlighting Themes */
        .hljs { background: transparent; color: var(--text-main); }
        .hljs-keyword, .hljs-selector-tag, .hljs-title, .hljs-section, .hljs-doctag, .hljs-name, .hljs-strong { color: #10b981; font-weight: 700; }
        .hljs-string, .hljs-built_in, .hljs-literal, .hljs-type, .hljs-addition, .hljs-tag, .hljs-quote, .hljs-selector-id, .hljs-selector-class { color: #3b82f6; }
        .hljs-comment, .hljs-deletion, .hljs-meta { color: var(--text-muted); font-style: italic; }
        .hljs-attr, .hljs-attribute, .hljs-variable, .hljs-template-variable, .hljs-symbol, .hljs-bullet { color: #06b6d4; }
        .hljs-params, .hljs-link { color: var(--text-main); }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-panel { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; color: black !important; }
            .hljs { color: black !important; }
            .hljs-keyword { color: #10b981 !important; }
            .hljs-string { color: #3b82f6 !important; }
            .hljs-attr { color: #06b6d4 !important; }
        }
    </style>

    {
      "imports": {

        "highlight.js": "https://esm.sh/highlight.js@^11.11.1",
        "html-to-image": "https://esm.sh/html-to-image@^1.11.11",
        "jspdf": "https://esm.sh/jspdf@^2.5.1",
        "react-simple-code-editor": "https://esm.sh/react-simple-code-editor@^0.14.1",

    }
